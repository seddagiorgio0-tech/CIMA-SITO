<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenland Archive – CIMA Project</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    /* LOGO BLOCK */
    .logo-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      margin-top: 10px;
    }

    .logo-a {
      display: block;
      margin: 5px auto 0 auto;
      max-width: 220px;
      height: auto;
    }

    .logo-cima {
      display: block;
      margin: 0 auto;
      max-width: 260px;
      height: auto;
    }

    .name-right {
      position: absolute;
      top: 50%;
      right: -150px;
      transform: translateY(-50%);
      font-size: 22px;
      color: #555;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .name-right {
        position: static;
        display: block;
        margin-top: 10px;
        transform: none;
        text-align: center;
      }
    }

    hr {
      width: 200px;
      margin: 10px auto;
      border: none;
      border-top: 1px solid black;
    }

    /* TITLE */
    h1 {
      font-size: 22px;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    /* HORIZONTAL BUTTON BAR */
    .button-row {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .menu-btn {
      padding: 12px 0;
      width: 150px;
      border: 1px solid black;
      background: white;
      font-size: 16px;
      text-decoration: none;
      color: black;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .menu-btn:hover {
      background: black;
      color: white;
    }

    .selected {
      background: black;
      color: white;
      cursor: default;
    }

    .selected:hover {
      background: black;
      color: white;
    }

    /* BACK LINK */
    .back-link {
      margin-top: 25px;
      display: inline-block;
      font-size: 15px;
      color: black;
      text-decoration: underline;
      transition: 0.2s;
    }

    .back-link:hover {
      color: #555;
    }

    /* PHOTO BLOCKS */
    .photo-block {
      margin: 40px 0;
    }

    .thumb {
      width: 100%;
      max-width: 900px;
      display: block;
      margin: 0 auto;
      cursor: pointer;
    }

    .caption {
      margin-top: 8px;
      font-size: 14px;
      color: #444;
    }

    /* MODAL */
    #modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    #modal img {
      max-width: 95%;
      max-height: 95%;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      font-size: 16px;
      color: #555;
      padding-bottom: 40px;
    }
  </style>

  <script>
    function openModal(src) {
      const modal = document.getElementById("modal");
      const modalImg = document.getElementById("modal-img");
      modal.style.display = "flex";
      modalImg.src = src;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</head>
