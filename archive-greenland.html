<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenland Archive – CIMA Project</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    /* LOGO BLOCK */
    .logo-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      margin-top: 10px;
    }

    .logo-a {
      display: block;
      margin: 5px auto 0 auto;
      max-width: 220px;
      height: auto;
    }

    .logo-cima {
      display: block;
      margin: 0 auto;
      max-width: 260px;
      height: auto;
    }

    .name-right {
      position: absolute;
      top: 50%;
      right: -150px;
      transform: translateY(-50%);
      font-size: 22px;
      color: #555;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .name-right {
        position: static;
        display: block;
        margin-top: 10px;
        transform: none;
        text-align: center;
      }
    }

    hr {
      width: 200px;
      margin: 10px auto;
      border: none;
      border-top: 1px solid black;
    }

    /* TITLE */
    h1 {
      font-size: 22px;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    /* HORIZONTAL BUTTON BAR */
    .button-row {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .menu-btn {
      padding: 12px 0;
      width: 150px; /* SAME WIDTH FOR ALL BUTTONS */
      border: 1px solid black;
      background: white;
      font-size: 16px;
      text-decoration: none;
      color: black;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .menu-btn:hover {
      background: black;
      color: white;
    }

    /* SELECTED BUTTON (PHOTOGRAPHY) */
    .selected {
      background: black;
      color: white;
      cursor: default;
    }

    .selected:hover {
      background: black;
      color: white;
    }

    /* BACK LINK */
    .back-link {
      margin-top: 25px;
      display: inline-block;
      font-size: 15px;
      color: black;
      text-decoration: underline;
      transition: 0.2s;
    }

    .back-link:hover {
      color: #555;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      font-size: 16px;
      color: #555;
      padding-bottom: 40px;
    }
  </style>
</head>

<body>

    <a href="news.html">News</a>
    <a href="contatti.html">Contacts</a>
    <a href="work-in-progress.html">Buy</a>
  </nav>

  <div class="logo-wrapper">
    <img src="logo-a.png" class="logo-a">
    <img src="logo-cima.png" class="logo-cima">
    <div class="name-right">GIORGIO SEDDA</div>
  </div>

  <hr>

  <h1>Greenland – Archive</h1>

  <div class="button-row">
    <a href="greenland-photo.html" class="menu-btn selected">Photography</a>
    <a href="greenland-video.html" class="menu-btn">Video</a>
    <a href="greenland-drawings.html" class="menu-btn">Drawings</a>
    <a href="greenland-diary.html" class="menu-btn">Diary</a>
  </div>

  <a href="galleria-intermedia.html" class="back-link">Back</a>

  <div class="footer">
    <strong>Giorgio Sedda</strong> – CIMA Project
  </div>

</body>
</html>
