<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenland – Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    /* TITLE */
    h1 {
      font-size: 22px;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    /* BUTTON ROW */
    .button-row {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .menu-btn {
      padding: 12px 0;
      width: 150px;
      border: 1px solid black;
      background: white;
      font-size: 16px;
      text-decoration: none;
      color: black;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .menu-btn:hover {
      background: black;
      color: white;
    }

    .selected {
      background: black;
      color: white;
      cursor: default;
    }

    /* BACK LINK */
    .back-link {
      margin-top: 25px;
      display: inline-block;
      font-size: 15px;
      color: black;
      text-decoration: underline;
      transition: 0.2s;
    }

    .back-link:hover {
      color: #555;
    }

    /* PHOTO VIEWER */
    .photo-container {
      width: 100%;
      max-width: 1200px;
      margin: 50px auto 10px auto;
    }

    .photo-container img {
      width: 100%;
      height: auto;
      object-fit: contain;
      pointer-events: none;
    }

    .caption {
      font-size: 16px;
      margin: 10px auto 25px auto;
      max-width: 900px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .nav-buttons button {
      padding: 10px 20px;
      font-size: 16px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .nav-buttons button:disabled {
      background: #ccc;
      cursor: default;
    }

    .info-btn {
      background: #444;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      font-size: 16px;
      color: #555;
      padding-bottom: 40px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="galleria-intermedia.html">Virtual Exhibitions</a>
    <a href="opere.html">Works</a>
    <a href="progetto.html">CIMA Project</a>
    <a href="biography.html">Biography</a>
    <a href="book.html">Book</a>
    <a href="news.html">News</a>
    <a href="contatti.html">Contacts</a>
    <a href="work-in-progress.html">Buy</a>
  </nav>

  <h1>Greenland – Photography</h1>

  <div class="button-row">
    <a href="greenland-photo.html" class="menu-btn selected">Photography</a>
    <a href="greenland-video.html" class="menu-btn">Video</a>
    <a href="greenland-drawings.html" class="menu-btn">Drawings</a>
    <a href="greenland-diary.html" class="menu-btn">Diary</a>
  </div>

  <!-- PHOTO VIEWER -->
  <div class="photo-container">
    <img id="photo" src="g01.jpg" alt="Photo">
  </div>

  <div class="caption" id="caption">
    Greenland – Photo 01
  </div>

  <div class="nav-buttons">
    <button id="backBtn">Back</button>
    <button id="infoBtn" class="info-btn">Info</button>
    <button id="nextBtn">Next</button>
  </div>

  <a href="galleria-intermedia.html" class="back-link">Back</a>

  <div class="footer">
    <strong>Giorgio Sedda</strong> – CIMA Project
  </div>

  <script>
    const totalPhotos = 56;
    let index = 1;

    const photo = document.getElementById("photo");
    const caption = document.getElementById("caption");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const infoBtn = document.getElementById("infoBtn");

    function updatePhoto() {
      const num = String(index).padStart(2, '0');
      photo.src = `g${num}.jpg`;
      caption.textContent = `Greenland – Photo ${num}`;

      backBtn.disabled = index === 1;
      nextBtn.disabled = index === totalPhotos;
    }

    backBtn.onclick = () => {
      if (index > 1) index--;
      updatePhoto();
    };

    nextBtn.onclick = () => {
      if (index < totalPhotos) index++;
      updatePhoto();
    };

    infoBtn.onclick = () => {
      alert("Scheda tecnica / Opzione di acquisto per la foto " + index);
    };

    updatePhoto();
  </script>

</body>
</html>
