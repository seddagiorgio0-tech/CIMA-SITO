<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenland Video – CIMA Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <a href="index.html">CIMA Project</a>
        </div>
        <nav>
            <ul>
                <li><a href="progetto.html">Progetto</a></li>
                <li><a href="opere.html">Opere</a></li>
                <li><a href="archive-greenland.html">Archivio Groenlandia</a></li>
                <li><a href="greenland-video.html" class="active">Video</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <!-- TITOLO SEZIONE -->
    <section class="section-title">
        <h1>Tracce documentate del progetto Groenlandia</h1>
        <p class="subtitle">Video dal viaggio e dalla ricerca sul campo</p>
    </section>

    <!-- VIDEO PRINCIPALE -->
    <section class="video-section">
        <video controls preload="metadata" class="video-cima" onclick="openVideoModal()">
            <source src="video/g-video01.mp4" type="video/mp4">
            Il tuo browser non supporta il tag video.
        </video>
        <p class="video-caption">g-video01 — Groenlandia, ricerca sul campo</p>
    </section>

    <!-- MODAL VIDEO -->
    <div id="videoModal" class="modal" onclick="closeVideoModal()">
        <span class="close">&times;</span>
        <div class="modal-content">
            <video controls autoplay class="modal-video">
                <source src="video/g-video01.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; CIMA Project – Giorgio Sedda</p>
    </footer>

    <!-- SCRIPT -->
    <script>
        function openVideoModal() {
            document.getElementById("videoModal").style.display = "block";
        }

        function closeVideoModal() {
            document.getElementById("videoModal").style.display = "none";
        }
    </script>

</body>
</html>
