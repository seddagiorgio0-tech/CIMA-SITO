<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greenland – Video</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: white;
  color: black;
  text-align: center;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 30px 0 5px 0;
  font-size: 16px;
}
nav a {
  text-decoration: none;
  color: black;
}

/* TITLE */
h1 {
  font-size: 22px;
  letter-spacing: 1px;
  margin-top: 20px;
}

/* MENU BUTTONS */
.button-row {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.menu-btn {
  padding: 12px 0;
  width: 150px;
  border: 1px solid #ccc;
  background: white;
  font-size: 16px;
  text-decoration: none;
  color: black;
  transition: 0.2s;
  display: inline-block;
  text-align: center;
}
.menu-btn:hover {
  background: #e6e6e6;
}
.selected {
  background: #e6e6e6;
  color: black;
  cursor: default;
  border-color: #ccc;
}

/* VIDEO */
.video-container {
  width: 100%;
  max-width: 800px;
  margin: 50px auto 10px auto;
}
video {
  width: 100%;
  height: auto;
  cursor: zoom-in;
  background: black;
}

.caption {
  font-size: 16px;
  margin: 10px auto 25px auto;
  max-width: 700px;
}

/* NAV BUTTONS */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 700px;
  margin: 0 auto;
}
.nav-buttons button {
  padding: 10px 20px;
  font-size: 16px;
  background: white;
  color: black;
  border: 1px solid #ccc;
  cursor: pointer;
  transition: 0.2s;
}
.nav-buttons button:hover {
  background: #e6e6e6;
}
.nav-buttons button:disabled {
  background: #f2f2f2;
  color: #999;
  border-color: #ddd;
  cursor: default;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  font-size: 16px;
  color: #555;
  padding-bottom: 40px;
}

/* MODAL VIDEO */
.video-modal {
  display: none;
  position: fixed;
  z-index: 99999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}
.video-modal video {
  max-width: 90%;
  max-height: 90%;
  background: black;
}
.video-modal-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 32px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <a href="../index.html">Home</a>
  <a href="../progetto.html">CIMA Project</a>

<h1>Greenland – Video</h1>

<div class="button-row">
  <a href="../archive-greenland.html" class="menu-btn">Photography</a>
  <a href="greenland-video.html" class="menu-btn selected">Video</a>
  <a href="../g-drawing.html" class="menu-btn">Drawings</a>
  <a href="../greenland-diary.html" class="menu-btn">Diary</a>
</div>

<!-- VIDEO -->
<div class="video-container">
  <video id="videoPlayer" controls>
    <source src="g-v01.mov" type="video/mov">
  </video>
</div>

<div class="caption" id="caption">Greenland – Video 01</div>

<div class="nav-buttons">
  <button id="backBtn" disabled>Back</button>
  <button id="infoBtn">Info</button>
  <button id="nextBtn" disabled>Next</button>
</div>

<div class="footer">
  <strong>Giorgio Sedda</strong> – CIMA Project
</div>

<script>
/* VIDEO LOGIC */
const totalVideos = 1;
let index = 1;

const videoPlayer = document.getElementById("videoPlayer");
const caption = document.getElementById("caption");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");

function updateVideo() {
  const num = String(index).padStart(2, '0');
  videoPlayer.src = `g-v${num}.mov`;
  caption.textContent = `Greenland – Video ${num}`;

  backBtn.disabled = index === 1;
  nextBtn.disabled = index === totalVideos;
}

updateVideo();
</script>

<!-- MODAL INFO -->
<div id="infoModal" style="
  display:none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(2px);
  justify-content: center;
  align-items: center;
  z-index: 9999;
">
  <div style="
    background: white;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    border: 1px solid #ccc;
    text-align: left;
  ">
    <h2 style="margin-top:0; font-size:20px;">Technical Sheet</h2>

    <div id="modalContent" style="font-size:16px; line-height:1.5;"></div>

    <div style="margin-top:25px; display:flex; justify-content:space-between;">
      <button id="closeModal" style="
        padding: 10px 20px;
        background:white;
        border:1px solid #ccc;
        cursor:pointer;
      ">Close</button>

      
    </div>
  </div>
</div>

<script>
/* INFO MODAL */
const infoBtn = document.getElementById("infoBtn");
const modal = document.getElementById("infoModal");
const closeModal = document.getElementById("closeModal");
const modalContent = document.getElementById("modalContent");

const technicalSheet = {
  luogo: "Greenland",
  anno: "2023",
  tecnica: "Digital video",
  supporto: "High‑resolution MOV",
  durata: "1.9 min",
  
  testo: "From the project “GREENLAND – a winter between people and wilderness”. A real moment captured during the journey."
};

infoBtn.onclick = () => {
  const num = String(index).padStart(2, '0');
  modalContent.innerHTML =
    `<strong>Title:</strong> Interview on TGR3 from the Red House ${num}<br>
     <strong>Location:</strong> ${technicalSheet.luogo}<br>
     <strong>Year:</strong> ${technicalSheet.anno}<br>
     <strong>Technique:</strong> ${technicalSheet.tecnica}<br>
     <strong>Format:</strong> ${technicalSheet.supporto}<br>
     <strong>Duration:</strong> ${technicalSheet.durata}<br>
   <br>
     ${technicalSheet.testo}`;
  modal.style.display = "flex";
};

closeModal.onclick = () => {
  modal.style.display = "none";
};

modal.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};
</script>

<!-- MODAL VIDEO -->
<div id="videoModal" class="video-modal">
  <span class="video-modal-close">&times;</span>
  <video id="videoModalPlayer" controls>
    <source src="" type="video/mp4">
  </video>
</div>

<script>
/* VIDEO ZOOM MODAL */
const videoModal = document.getElementById("videoModal");
const videoModalPlayer = document.getElementById("videoModalPlayer");
const videoModalClose = document.querySelector(".video-modal-close");

videoPlayer.addEventListener("click", () => {
  const num = String(index).padStart(2, '0');
  videoModalPlayer.src = `g-v${num}.mp4`;
  videoModal.style.display = "flex";
});

videoModalClose.onclick = () => {
  videoModal.style.display = "none";
  videoModalPlayer.pause();
};

videoModal.onclick = (e) => {
  if (e.target === videoModal) {
    videoModal.style.display = "none";
    videoModalPlayer.pause();
  }
};
</script>

</body>
</html>
