<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenland – Diary</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    h1 {
      font-size: 22px;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    .button-row {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .menu-btn {
      padding: 12px 0;
      width: 150px;
      border: 1px solid #ccc;
      background: white;
      font-size: 16px;
      text-decoration: none;
      color: black;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .menu-btn:hover {
      background: #e6e6e6;
    }

    .selected {
      background: #e6e6e6;
      color: black;
      cursor: default;
      border-color: #ccc;
    }

    .book-icons {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .book-icon {
      width: 260px;
      height: 360px;
      border: 1px solid #ccc;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      text-decoration: none;
      color: black;
    }

    .book-icon:hover {
      background: #e6e6e6;
    }

    /* LETTORE */
    #reader {
      display: none;
      margin-top: 40px;
    }

    .page-container {
      width: 100%;
      max-width: 500px;
      margin: 20px auto 5px auto;
    }

    .page-container img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border: 1px solid #ddd;
    }

    .caption {
      font-size: 15px;
      margin: 5px auto 10px auto;
      max-width: 500px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .nav-buttons button {
      padding: 8px 18px;
      font-size: 15px;
      background: white;
      color: black;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-buttons button:hover {
      background: #e6e6e6;
    }

    #backToBooks {
      margin-top: 30px;
      padding: 10px 20px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="progetto.html">CIMA Project</a>
    <a href="galleria-intermedia.html">Virtual Exhibitions</a>
    <a href="opere.html">Works</a>
    <a href="book.html">Book</a>
    <a href="news.html">News</a>
    <a href="biography.html">Biography</a>
    <a href="contatti.html">Contacts</a>
    <a href="work-in-progress.html">Buy</a>
  </nav>

  <h1>Greenland – Diary</h1>

  <div class="button-row">
    <a href="archive-greenland.html" class="menu-btn">Photography</a>
    <a href="greenland-video.html" class="menu-btn">Video</a>
    <a href="g-drawing.html" class="menu-btn">Drawings</a>
    <a href="greenland-diary.html" class="menu-btn selected">Diary</a>
  </div>

  <!-- SCELTA LIBRO -->
  <div id="bookChoice">
    <h2>Diary – Choose your language</h2>

    <div class="book-icons">
      <div class="book-icon" onclick="openBook('en')">
        <strong>GREENLAND</strong>
        <span style="font-size:16px; margin-top:10px;">Diary – EN</span>
      </div>

      <div class="book-icon" onclick="openBook('it')">
        <strong>GROENLANDIA</strong>
        <span style="font-size:16px; margin-top:10px;">Diario – IT</span>
      </div>
    </div>
  </div>

  <!-- LETTORE -->
  <div id="reader">
    <div class="page-container">
      <img id="page" src="" alt="Diary Page">
    </div>

    <div class="caption" id="caption">Page 01</div>

    <div class="nav-buttons">
      <button id="backBtn">Back</button>
      <button id="infoBtn">Info</button>
      <button id="nextBtn">Next</button>
    </div>

    <button id="backToBooks" onclick="closeBook()">Back to languages</button>
  </div>

  <script>
    let lang = "";
    let index = 1;
    const totalPages = 1;

    function openBook(selectedLang) {
      lang = selectedLang;
      index = 1;

      document.getElementById("bookChoice").style.display = "none";
      document.getElementById("reader").style.display = "block";

      updatePage();
    }

    function closeBook() {
      document.getElementById("reader").style.display = "none";
      document.getElementById("bookChoice").style.display = "block";
    }

    function updatePage() {
      const num = String(index).padStart(2, '0');
      document.getElementById("page").src = `L-${lang}${index}.jpg`;
      document.getElementById("caption").textContent = `Page ${num}`;
    }

    document.getElementById("backBtn").onclick = () => {
      if (index > 1) index--;
      updatePage();
    };

    document.getElementById("nextBtn").onclick = () => {
      if (index < totalPages) index++;
      updatePage();
    };
  </script>

</body>
</html>
