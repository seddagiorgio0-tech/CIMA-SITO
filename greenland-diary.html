    .book-icons {

      display: flex;
      justify-content: center;

      flex-wrap: wrap;
    }

    .book-icon {
      width: 260px;
      height: 360px;
      border: 1px solid #cfc7b8;
      background: #f7f3e9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.35s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      border-radius: 6px;
    }

    .book-icon:hover {
      transform: translateY(-4px) rotate(-1deg);
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      background: #f3ecdf;
    }

    .book-icon strong {
      font-family: "Georgia", serif;
      font-style: italic;
      font-size: 22px;
      letter-spacing: 0.5px;
    }

    .book-icon span {
      font-family: "Georgia", serif;
      font-style: italic;
      font-size: 16px;
    }

    .open-book {
      width: 170px;
      height: 210px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      margin-bottom: 20px;
      position: relative;
      transform: rotate(-1deg);
    }

    .page {
      flex: 1;
      background: #faf4e6;
      border: 1px solid #d8d0c0;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.10);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .page.left { border-right: none; }
    .page.right { border-left: none; }

    .page::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      bottom: 0;
      right: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0) 0%, #e8dfcf 100%);
      border-bottom-right-radius: 4px;
      opacity: 0.8;
    }

    .map-continua {
      position: absolute;
      top: 10%;
      left: 0;
      width: 200%;
      height: 80%;
      pointer-events: none;
      opacity: 0.45;
    }

    .map-continua svg {
      width: 100%;
      height: 100%;
    }

    .fold {
      position: absolute;
      width: 200%;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0) 40%);
      pointer-events: none;
    }

    .fold2 {
      position: absolute;
      width: 200%;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(225deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0) 40%);
      pointer-events: none;
    }

    .book-icon:hover .open-book {
      transform: rotate(-2deg) translateY(-2px);
    }

    .footer {
      margin-top: 60px;
      font-size: 16px;
      color: #555;
      padding-bottom: 40px;
    }

    #reader {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow-y: auto;
      background: #f7f3e9;
      z-index: 9999;
    }

    .page-container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      background: linear-gradient(to bottom, #f7f3e9 0%, #f3ecdf 100%);
      padding: 20px 0;
    }

    .page-container img {
      background: #f7f3e9;
      max-height: 86vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border: none;
      box-shadow: none;
    }

    .caption {
      font-size: 15px;
      margin: 2px auto 4px auto;
      max-width: 500px;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 560px;
      margin: 0 auto;
      gap: 10px;
    }

    .nav-btn {
      padding: 6px 0;

      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
      flex: 1;
      height: 38px;
      white-space: nowrap;
    }
    #infoModal {
      display:none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    #infoBox {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 450px;
      border: 1px solid #ccc;
      text-align: left;
    }

  <script>
    let lang = "";
    let index = 1;
    let pages = [];   // ← elenco dinamico delle pagine trovate

    // ------------------------------------------------------------
    //   FUNZIONE AUTOMATICA: rileva tutte le pagine disponibili
    // ------------------------------------------------------------
    async function detectPages(selectedLang) {
      const detected = [];
      let n = 1;

      while (true) {
        const filename = `L-${selectedLang}${n}.jpg`;

        try {
          const response = await fetch(filename, { method: "HEAD" });

          if (!response.ok) break;   // ← si ferma quando il file non esiste

          detected.push(filename);
          n++;
        } catch (e) {
          break;
        }
      }

      return detected;
    }

    // ------------------------------------------------------------
    //   APERTURA DEL LIBRO
    // ------------------------------------------------------------
    async function openBook(selectedLang) {
      lang = selectedLang;
      index = 0;

      // rileva automaticamente tutte le pagine disponibili
      pages = await detectPages(lang);

      if (pages.length === 0) {
        alert("No pages found for this language.");
        return;
      }

      // nasconde il menu
      document.getElementById("menu").style.display = "none";
      document.getElementById("title").style.display = "none";
      document.getElementById("sectionButtons").style.display = "none";
      document.getElementById("bookChoice").style.display = "none";

      // mostra il lettore
      document.getElementById("reader").style.display = "block";

      updatePage();
    }

    // ------------------------------------------------------------
    //   CHIUSURA DEL LIBRO
    // ------------------------------------------------------------
    function closeBook() {
      document.getElementById("menu").style.display = "flex";
      document.getElementById("title").style.display = "block";
      document.getElementById("sectionButtons").style.display = "flex";
      document.getElementById("bookChoice").style.display = "block";

      document.getElementById("reader").style.display = "none";
    }

    // ------------------------------------------------------------
    //   AGGIORNA PAGINA
    // ------------------------------------------------------------
    function updatePage() {
      const file = pages[index];
      document.getElementById("page").src = file;

      const num = String(index + 1).padStart(2, "0");
      document.getElementById("caption").textContent = `Page ${num}`;
    }

    // ------------------------------------------------------------
    //   NAVIGAZIONE
    // ------------------------------------------------------------
    document.getElementById("backBtn").onclick = () => {
      if (index > 0) {
        index--;
        updatePage();
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      if (index < pages.length - 1) {
        index++;
        updatePage();
      }
    };

    // ------------------------------------------------------------
    //   INFO MODAL
    // ------------------------------------------------------------
    document.getElementById("infoBtn").onclick = () => {
      const num = String(index + 1).padStart(2, '0');

      document.getElementById("modalContent").innerHTML = `
        <strong>Title:</strong> Greenland – Diary<br>
        <strong>Page:</strong> ${num}<br>
        <strong>Language:</strong> ${lang === "en" ? "English" : "Italian"}<br>
        <strong>Author:</strong> Giorgio Sedda<br>
        <strong>Project:</strong> Un monde couleurs Project + CIMA Project<br>
        <strong>Technique:</strong> Travel diary narrative<br>
        <strong>Year:</strong> 2023–2026<br><br>
        This page is part of the narrative diary created during the winter journey in Greenland.
      `;

      document.getElementById("infoModal").style.display = "flex";
    };

    document.getElementById("closeModal").onclick = () => {
      document.getElementById("infoModal").style.display = "none";
    };

    document.getElementById("infoModal").onclick = (e) => {
      if (e.target === document.getElementById("infoModal")) {
        document.getElementById("infoModal").style.display = "none";
      }
    };
  </script>
