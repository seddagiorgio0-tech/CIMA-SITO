<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Works – CIMA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
      position: relative;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    /* LOGO + NAME */
    .logo-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      margin-top: 10px;
    }

    .logo-a {
      display: block;
      margin: 5px auto 0 auto;
      max-width: 220px;
      height: auto;
    }

    .logo-cima {
      display: block;
      margin: 0 auto;
      max-width: 260px;
      height: auto;
    }

    .name-right {
      position: absolute;
      top: 50%;
      right: -150px;
      transform: translateY(-50%);
      font-size: 22px;
      color: #555;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .name-right {
        position: static;
        display: block;
        margin-top: 10px;
        transform: none;
        text-align: center;
      }
    }

    hr {
      width: 200px;
      margin: 5px auto;
      border: none;
      border-top: 1px solid black;
    }

    /* CENTRAL BLOCK */
    .central-block {
      width: 720px;
      max-width: 100%;
      margin: 0 auto;
      margin-top: 20px;
    }

    /* TITLE */
    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* WORKS LAYOUT */
    .works-wrapper {
      display: flex;
      flex-direction: column;
      gap: 26px;
      margin-top: 30px;
      align-items: center;
    }

    .work-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px;
      width: 100%;
    }

    /* BUTTON LEFT COLUMN */
    .work-button {
      width: 235px; /* ridotto */
      text-align: center;
    }

    .work-button a {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      border: 1px solid black;
      padding: 8px 10px;
      text-decoration: none;
      color: black;
      font-size: 15px;
      transition: 0.2s;
      height: 68px; /* ridotto */
    }

    .work-button a:hover {
      background-color: #d9d9d9;
      color: black;
    }

    /* TITLES INSIDE BUTTONS */
    .title-line1 {
      font-weight: bold;
      text-transform: uppercase;
    }

    .title-line2 {
      font-style: italic;
      font-size: 12.5px; /* leggermente ridotto */
      line-height: 1.2;
    }

    /* LOGO RIGHT COLUMN */
    .work-logo {
      width: 130px; /* ridotto */
      text-align: center;
    }

    .work-logo img {
      width: 78%; /* ridotto proporzionalmente */
      height: auto;
      opacity: 0.7;
    }

    /* FOOTER */
    .footer {
      margin-top: 35px;
      font-size: 16px;
      color: #555;
    }

    @media (max-width: 600px) {
      .work-row {
        flex-direction: column;
        gap: 16px;
      }

      .work-button {
        width: 100%;
      }

      .work-button a {
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>

<body>

    <a href="work-in-progress.html">Buy</a>
  </nav>

    <div class="name-right">GIORGIO SEDDA</div>
  </div>

        <div class="work-logo">

  </div>

  <div class="footer">
    <strong>Giorgio Sedda</strong> – CIMA Project
  </div>

</body>
</html>
