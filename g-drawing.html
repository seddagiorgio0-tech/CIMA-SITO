  <script>
    const totalDrawings = 11;
    let index = 1;

    const content = document.getElementById("content");

    const nextBtn = document.getElementById("nextBtn");

    const texts = [
      "",

      `Night in the Fjord <br>
 <br>
The wind had changed its voice; it was no longer the steady breath that had followed me all day. Now it came in gusts, as if something were disturbing it, as if the fjord itself were holding its breath. I was alone, and I knew it. I pitched the tent quickly, my hands trembling more from exhaustion than from the cold. The fjord was motionless, a sheet of ice reflecting the last glimmers of twilight. And yet, behind that apparent calm, I felt an attention I couldn’t ignore. He was there, somewhere. The White Bear.<br> <br>
Notte nel fiordo <br>
<br>
Il vento aveva cambiato voce; non era più il respiro costante che mi aveva accompagnato per tutto il giorno. Ora arrivava a raffiche, come se qualcosa lo disturbasse, come se fosse il fiordo stesso a trattenere il fiato. Ero solo, e lo sapevo. Montai la tenda in fretta, con le mani che tremavano più per la stanchezza che per il freddo. Il fiordo era immobile, una lastra di ghiaccio che rifletteva gli ultimi bagliori del crepuscolo. Eppure, dietro quella calma apparente, percepivo un’attenzione che non potevo ignorare. Lui era lì, da qualche parte. L’Orso Bianco.`,

      `The rifle lay next to the tent. It didn’t make me feel safe — not really. It was just an object, an extra weight. But I needed it. It was my only psychological anchor, the illusion of having a margin, a boundary, a “if something happens…”. The truth is, I didn’t want to use it. I hadn’t come to challenge him. I had come to cross his home, and I hoped he would let me pass. When night fell, it truly fell. A total, dense darkness that seemed to absorb every sound. I slipped into my sleeping bag and closed my eyes, but it was useless. The silence was too vast to sleep. Then came the first noise. <br>
<br>
Il fucile era posato accanto alla tenda. Non mi faceva sentire al sicuro — non davvero. Era solo un oggetto, un peso in più. Ma ne avevo bisogno. Era il mio unico ancoraggio psicologico, l’illusione di avere un margine, un confine, un “se succede qualcosa…”. La verità è che non volevo usarlo. Non ero venuto per sfidarlo. Ero venuto ad attraversare la sua casa, e speravo che mi avrebbe lasciato passare. Quando la notte cadde, cadde davvero. Un buio totale, denso, che sembrava assorbire ogni suono. Mi infilai nel sacco a pelo e chiusi gli occhi, ma fu inutile. Il silenzio era troppo vasto per dormire. Poi arrivò il primo rumore.`,

      `A rustle, distant but not distant enough. I opened my eyes in an instant, and my heart began pounding as if it wanted to burst out of my chest. I stayed still, listening. The wind had stopped, and when the wind falls silent, the Arctic speaks. Another sound, closer now, and the snow giving way under an enormous weight. I lifted myself slightly, holding my breath. I couldn’t see anything, but I felt him — like having a thought walking outside the tent. The smell came last, a strong, wild smell. A smell I had never sensed so close.<br>
<br>
Un fruscio, lontano ma non abbastanza lontano. Aprii gli occhi di scatto, e il cuore cominciò a battere come se volesse uscirmi dal petto. Rimasi immobile, in ascolto. Il vento si era fermato, e quando il vento tace, l’Artico parla. Un altro suono, più vicino ora, e la neve che cedeva sotto un peso enorme. Mi sollevai appena, trattenendo il respiro. Non vedevo nulla, ma lo sentivo — come un pensiero che camminasse fuori dalla tenda. L’odore arrivò per ultimo, un odore forte, selvatico. Un odore che non avevo mai percepito così vicino.`,

      `He was there, the White Bear, just a few meters from me. I didn’t dare move. I didn’t even dare take a deep breath. The tent was a ridiculous boundary, a thin veil between me and a force I could not control. And yet, in the midst of fear, I felt something else. A shiver of excitement, of respect, of awareness. I was in his world, and he knew it. Minutes passed that felt like hours; every step I heard outside was a blow to the heart. Every silence an endless wait.<br>
<br>
Era lì, l’Orso Bianco, a pochi metri da me. Non osavo muovermi. Non osavo nemmeno fare un respiro profondo. La tenda era un confine ridicolo, un velo sottile tra me e una forza che non potevo controllare. Eppure, in mezzo alla paura, sentii qualcos’altro. Un brivido di eccitazione, di rispetto, di consapevolezza. Ero nel suo mondo, e lui lo sapeva. I minuti passarono come ore; ogni passo che sentivo fuori era un colpo al cuore. Ogni silenzio un’attesa infinita.`,

      `Then slowly, the sounds drifted away — first one step, then another. Then only the fjord again, still and silent. I stayed awake until dawn, unable to close my eyes. When I finally stepped out of the tent, the low sun lit up a paradise, but it revealed no tracks. I knelt, brushing the snow with my hand, and in that moment I understood something simple and immense: I had not been threatened. I had been tolerated. In the silence of the fjord, I felt part of something greater than myself.<br>
<br>
Poi lentamente, i suoni si allontanarono — prima un passo, poi un altro. Poi solo il fiordo di nuovo, immobile e silenzioso. Rimasi sveglio fino all’alba, incapace di chiudere gli occhi. Quando finalmente uscii dalla tenda, il sole basso illuminava un paradiso, ma non rivelava alcuna traccia. Mi inginocchiai, sfiorando la neve con la mano, e in quel momento compresi qualcosa di semplice e immenso: non ero stato minacciato. Ero stato tollerato. Nel silenzio del fiordo, mi sentii parte di qualcosa più grande di me.`,

      "", "", "", "", ""
    ];

    function render() {
      content.innerHTML = "";

      const num = String(index).padStart(2, '0');
      const img = `g-drawing${num}.jpg`;

      /* BLOCCO DOPPIO (1–5) */
      if (index <= 5) {
        const block = document.createElement("div");
        block.className = "block";

        const textCol = `<div class="text-col">${texts[index]}</div>`;
        const imgCol = `<div class="img-col">
          <img src="${img}" class="zoomable">
        </div>`;

        block.innerHTML = (index % 2 === 1)
          ? textCol + imgCol
          : imgCol + textCol;

        content.appendChild(block);

      /* BLOCCO SINGOLO (6–10) */
      } else if (index <= 10) {
        const single = document.createElement("div");
        single.className = "single-img";

        single.innerHTML = `<img src="${img}" class="zoomable">`;

        content.appendChild(single);

      /* BLOCCO 11 */
      } else {
        const block = document.createElement("div");
        block.className = "block";

        block.innerHTML = `
          <div class="img-col"><img src="${img}" class="zoomable"></div>
          <div class="text-col"></div>
        `;

        content.appendChild(block);
      }

      backBtn.disabled = index === 1;
      nextBtn.disabled = index === totalDrawings;
    }

    backBtn.onclick = () => { if (index > 1) index--; render(); };
    nextBtn.onclick = () => { if (index < totalDrawings) index++; render(); };

    render();
  </script>
  <!-- MODAL IMMAGINE (ZOOM) -->
  <div id="imgModal" class="img-modal">
    <span class="img-modal-close">&times;</span>
    <img id="imgModalContent" src="">
  </div>

  <script>
    const imgModal = document.getElementById("imgModal");
    const imgModalContent = document.getElementById("imgModalContent");
    const imgModalClose = document.querySelector(".img-modal-close");

    document.addEventListener("click", function(e) {
      if (e.target.classList.contains("zoomable")) {
        imgModal.style.display = "flex";
        imgModalContent.src = e.target.src;
      }
    });

    imgModalClose.onclick = () => {
      imgModal.style.display = "none";
    };

    imgModal.onclick = (e) => {
      if (e.target === imgModal) {
        imgModal.style.display = "none";
      }
    };
  </script>

      modalContent.innerHTML = sheet;
      modal.style.display = "flex";
    };

    closeModal.onclick = () => { modal.style.display = "none"; };
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
  </script>
