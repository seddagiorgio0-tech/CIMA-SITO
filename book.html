<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book – CIMA Project</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
    }

    /* NAVIGAZIONE */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px 0 5px 0;
      font-size: 16px;
      position: relative;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    /* LOGO */
    .logo-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      margin-top: 10px;
    }

    .logo-a {
      display: block;
      margin: 5px auto 0 auto;
      max-width: 220px;
      height: auto;
    }

    .logo-cima {
      display: block;
      margin: 0 auto;
      max-width: 260px;
      height: auto;
    }

    .name-right {
      position: absolute;
      top: 50%;
      right: -150px;
      transform: translateY(-50%);
      font-size: 22px;
      color: #555;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .name-right {
        position: static;
        display: block;
        margin-top: 10px;
        transform: none;
        text-align: center;
      }
    }

    hr {
      width: 200px;
      margin: 5px auto;
      border: none;
      border-top: 1px solid black;
    }

    /* CONTENUTO */
    .central-block {
      width: 720px;
      max-width: 100%;
      margin: 0 auto;
      margin-top: 20px;
      text-align: left;
      line-height: 1.6;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* MINIATURE CATALOGHI */
    .catalog-thumbs {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 40px;
    }

    .catalog-thumb {
      width: 200px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .catalog-thumb:hover {
      opacity: 0.7;
    }

    /* MODAL GENERALE */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-window {
      background: white;
      padding: 20px;
      max-width: 98%;
      max-height: 98%;
      position: relative;
      text-align: center;
      border-radius: 4px;
    }

    .modal-close {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    /* IMMAGINE FULL-SCREEN */
    .modal-image {
      max-width: 95vw;
      max-height: 85vh;
      border: none;
    }

    .modal-controls {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .modal-button {
      padding: 6px 14px;
      border: 1px solid #333;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    .modal-button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* MODAL SCHEDA TECNICA */
    .tech-modal-window {
      background: white;
      padding: 20px;
      width: 420px;
      max-width: 90%;
      position: relative;
      text-align: left;
      border-radius: 4px;
    }

    .tech-sheet p {
      font-size: 14px;
      margin: 6px 0;
    }

    .buy-button {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background: black;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .buy-button + .buy-button {
      margin-left: 8px;
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      font-size: 16px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="progetto.html">CIMA Project</a>
    <a href="galleria-intermedia.html">Virtual Exhibitions</a>
    <a href="opere.html">Works</a>
    <a href="book.html" class="active">Book</a>
    <a href="news.html">News</a>
    <a href="biography.html">Biography</a>
    <a href="contatti.html">Contacts</a>
    <a href="work-in-progress.html">Buy</a>
  </nav>

  <!-- LOGO -->
  <div class="logo-wrapper">
    <img src="logo-a.png" class="logo-a">
    <img src="logo-cima.png" class="logo-cima">
    <div class="name-right">GIORGIO SEDDA</div>
  </div>

  <hr>

  <div class="central-block">

    <h1>Book</h1>

    <!-- MINIATURE ORDINATE: AFRICA – ISLANDA – GROENLANDIA -->
    <div class="catalog-thumbs">
      <img src="c-a01.jpeg" class="catalog-thumb" onclick="openCatalog(2)">
      <img src="c-i01.jpeg" class="catalog-thumb" onclick="openCatalog(1)">
      <img src="g-1.jpg" class="catalog-thumb" onclick="openCatalog(3)">
    </div>

  </div>

  <!-- MODAL CATALOGO -->
  <div id="catalog-modal" class="modal-overlay">
    <div class="modal-window">
      <span class="modal-close" onclick="closeCatalog()">✕</span>
      <img id="catalog-image" class="modal-image" src="">
      <div class="modal-controls">
        <button id="prev-btn" class="modal-button">Back</button>
        <button class="modal-button" onclick="openTech()">Info</button>
        <button id="next-btn" class="modal-button">Next</button>
      </div>
      <div id="page-indicator" style="margin-top:10px; font-size:14px; color:#555;"></div>
    </div>
  </div>

  <!-- MODAL SCHEDA TECNICA -->
  <div id="tech-modal" class="modal-overlay">
    <div class="tech-modal-window">
      <span class="modal-close" onclick="closeTech()">✕</span>
      <div id="tech-content" class="tech-sheet"></div>
    </div>
  </div>

  <div class="footer">
    <strong>Giorgio Sedda</strong> – CIMA Project
  </div>

<script>
let currentCatalog = 1;
let currentPage = 1;

/* PAGINE REALI */
let totalPages = {
  1: 80,  // Islanda
  2: 64,  // Africa
  3: 1    // Groenlandia (solo copertina)
};

function openCatalog(n) {
  currentCatalog = n;
  currentPage = 1;
  updateCatalogImage();
  document.getElementById("catalog-modal").style.display = "flex";
}

function closeCatalog() {
  document.getElementById("catalog-modal").style.display = "none";
}

function updateCatalogImage() {
  let prefix = "";

  if (currentCatalog === 1) prefix = "i-";
  if (currentCatalog === 2) prefix = "a-";
  if (currentCatalog === 3) prefix = "g-";

  const max = totalPages[currentCatalog];

  document.getElementById("catalog-image").src = prefix + currentPage + ".jpg";

  document.getElementById("page-indicator").textContent =
    "Page " + currentPage + " of " + max;

  document.getElementById("prev-btn").disabled = currentPage === 1;
  document.getElementById("next-btn").disabled = false;
}

document.getElementById("prev-btn").onclick = function() {
  if (currentPage > 1) {
    currentPage--;
    updateCatalogImage();
  }
};

document.getElementById("next-btn").onclick = function() {
  const max = totalPages[currentCatalog];

  if (currentCatalog === 3 && currentPage === 1) {
    alert("Currently in production");
    return;
  }

  if (currentPage < max) {
    currentPage++;
    updateCatalogImage();
  }
};

function openTech() {
  const tech = document.getElementById("tech-content");

  if (currentCatalog === 1) {
    tech.innerHTML = `
      <p><strong>Title:</strong> "Face au froid" - Un monde de couleurs project</p>
      <p><strong>Locations:</strong> Iceland</p>
      <p><strong>Total pages:</strong> 80</p>
      <p><strong>Printed edition:</strong> Softcover, 30 × 19 cm</p>
      <p><strong>Digital edition:</strong> Same content as printed edition</p>
      <p><strong>Medium:</strong> Digital + printed catalogue</p>
      <p><strong>Concept:</strong> A crossing through northern territories.</p>
      <a class="buy-button" href="https://paypal.me/giorgiosedda/5" target="_blank">Buy digital edition</a>
      <a href="/CIMA/work-in-progress.html?title=Iceland%20Catalogue" class="buy-button">
   Buy printed edition
</a>


    `;
  }

  else if (currentCatalog === 2) {
    tech.innerHTML = `
      <p><strong>Title:</strong> "Reportage en Africa" - Un monde de couleurs project</p>
      <p><strong>Location:</strong> Togo</p>
      <p><strong>Total pages:</strong> 64</p>
      <p><strong>Printed edition:</strong> Softcover, 30 × 19 cm</p>
      <p><strong>Digital edition:</strong> Same content as printed edition</p>
      <p><strong>Medium:</strong> Digital + printed catalogue</p>
      <p><strong>Concept:</strong> Encounters with African communities.</p>
      <a class="buy-button" href="https://paypal.me/giorgiosedda/3" target="_blank">Buy digital edition</a>
      <a href="/CIMA/work-in-progress.html?title=Africa%20Catalogue" class="buy-button">
   Buy printed edition
</a>



    `;
  }

  else if (currentCatalog === 3) {
    tech.innerHTML = `
      <p><strong>Title:</strong> "Groenlandia" - CIMA Project</p>
      <p><strong>Status:</strong> Currently in production</p>
      <p><strong>Content:</strong> The catalogue is being finalized.</p>
    `;
  }

  document.getElementById("tech-modal").style.display = "flex";
}

function closeTech() {
  document.getElementById("tech-modal").style.display = "none";
}
</script>

</body>
</html>
